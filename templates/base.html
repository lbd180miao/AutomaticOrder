{% load static %}
<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AutomaticOrder{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <header class="topbar">
    <div class="brand">AutomaticOrder</div>
    <nav>
      {% with path=request.path %}
      <a href="{% url 'core:dashboard' %}" class="{% if path == '/' %}active{% endif %}">总览</a>
      <a href="{% url 'production:product_list' %}" class="{% if '/production/' in path %}active{% endif %}">生产</a>
      <a href="{% url 'workflow:current' %}" class="{% if '/workflow/' in path %}active{% endif %}">流程</a>
      <a href="{% url 'devices:status' %}" class="{% if '/devices/' in path %}active{% endif %}">设备</a>
      <a href="{% url 'vision:task_list' %}" class="{% if '/vision/' in path %}active{% endif %}">视觉</a>
      <a href="{% url 'mes:record_list' %}" class="{% if '/mes/' in path %}active{% endif %}">MES</a>
      <a href="{% url 'alarms:alarm_list' %}" class="{% if '/alarms/' in path %}active{% endif %}">报警</a>
      <a href="{% url 'traceability:search' %}" class="{% if '/traceability/' in path %}active{% endif %}">追溯</a>
      {% endwith %}
    </nav>
  </header>
  <main class="page">
    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="msg msg-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
